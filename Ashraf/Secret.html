<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
<title>Secret Line — Ephemeral Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  html, body, #root { height: 100%; margin: 0; }
  body { background: #0B0E10; font-family: 'JetBrains Mono', ui-monospace, monospace; }
  * { -webkit-tap-highlight-color: transparent; }
</style>
</head>
<body>
<div id="root"></div>

<!-- Firebase (compat build so it works easily with a plain <script> setup) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script type="text/babel" data-type="module" data-presets="react">
const { useState, useEffect, useRef, useCallback } = React;

// ---- Firebase setup ----
const firebaseConfig = {
  apiKey: "AIzaSyBU1Rf9EmOqvEybTi1hfoQxGr1oiOzg1Xw",
  authDomain: "secret-chat-dd373.firebaseapp.com",
  databaseURL: "https://secret-chat-dd373-default-rtdb.firebaseio.com",
  projectId: "secret-chat-dd373",
  storageBucket: "secret-chat-dd373.firebasestorage.app",
  messagingSenderId: "260755124120",
  appId: "1:260755124120:web:689f9b444077a87ee845ed"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ---- helpers ----
function generateRoomCode() {
  const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  let code = "";
  for (let i = 0; i < 5; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code;
}
function genId() {
  return Math.random().toString(36).slice(2) + Date.now().toString(36);
}

// ---- simple inline icons (no external icon package needed) ----
const Icon = {
  Radio: (p) => (
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}>
      <path d="M4.9 19.1C1 15.2 1 8.8 4.9 4.9" /><path d="M7.8 16.2c-2.3-2.3-2.3-6.1 0-8.5" />
      <circle cx="12" cy="12" r="2" /><path d="M16.2 7.8c2.3 2.3 2.3 6.1 0 8.5" /><path d="M19.1 4.9C23 8.8 23 15.2 19.1 19.1" />
    </svg>
  ),
  Copy: (p) => (
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}>
      <rect x="9" y="9" width="13" height="13" rx="2" ry="2" /><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
    </svg>
  ),
  Check: (p) => (
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}>
      <polyline points="20 6 9 17 4 12" />
    </svg>
  ),
  LogOut: (p) => (
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}>
      <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" /><polyline points="16 17 21 12 16 7" /><line x1="21" y1="12" x2="9" y2="12" />
    </svg>
  ),
  Send: (p) => (
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}>
      <line x1="22" y1="2" x2="11" y2="13" /><polygon points="22 2 15 22 11 13 2 9 22 2" />
    </svg>
  ),
  ShieldOff: (p) => (
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}>
      <path d="M19.69 14a6.9 6.9 0 0 0 .31-2V5l-8-3-3.16 1.18" /><path d="M4.73 4.73L4 5v7c0 6 8 10 8 10a20.29 20.29 0 0 0 5.62-4.38" /><line x1="1" y1="1" x2="23" y2="23" />
    </svg>
  ),
};

function App() {
  const [stage, setStage] = useState("name");
  const [name, setName] = useState("");
  const [roomInput, setRoomInput] = useState("");
  const [roomCode, setRoomCode] = useState("");
  const [messages, setMessages] = useState([]);
  const [draft, setDraft] = useState("");
  const [copied, setCopied] = useState(false);
  const [error, setError] = useState("");
  const [connecting, setConnecting] = useState(false);
  const myId = useRef(genId());
  const bottomRef = useRef(null);
  const nameInputRef = useRef(null);
  const roomInputRef = useRef(null);
  const msgInputRef = useRef(null);
  const msgListRef = useRef(null);

  useEffect(() => {
    if (stage === "name") nameInputRef.current && nameInputRef.current.focus();
    if (stage === "room") roomInputRef.current && roomInputRef.current.focus();
    if (stage === "chat") msgInputRef.current && msgInputRef.current.focus();
  }, [stage]);

  useEffect(() => {
    bottomRef.current && bottomRef.current.scrollIntoView({ behavior: "smooth" });
  }, [messages]);

  const cleanupRoom = useCallback(async (code) => {
    if (!code) return;
    try {
      const presenceSnap = await db.ref(`rooms/${code}/presence`).get();
      const presence = presenceSnap.val() || {};
      const remaining = Object.keys(presence).filter((id) => id !== myId.current);
      if (remaining.length === 0) {
        await db.ref(`rooms/${code}`).remove();
      } else {
        await db.ref(`rooms/${code}/presence/${myId.current}`).remove();
      }
    } catch (e) {}
  }, []);

  useEffect(() => {
    const handleUnload = () => { if (roomCode) cleanupRoom(roomCode); };
    window.addEventListener("beforeunload", handleUnload);
    return () => window.removeEventListener("beforeunload", handleUnload);
  }, [roomCode, cleanupRoom]);

  useEffect(() => {
    return () => { if (msgListRef.current) msgListRef.current.off(); };
  }, []);

  async function enterRoom(code, isCreating) {
    setError("");
    setConnecting(true);
    try {
      const roomSnap = await db.ref(`rooms/${code}`).get();
      const exists = roomSnap.exists();

      if (!isCreating && !exists) {
        setError("Room not found. Check the code and try again.");
        setConnecting(false);
        return;
      }
      if (isCreating && exists) {
        const fresh = generateRoomCode();
        setConnecting(false);
        return enterRoom(fresh, true);
      }

      const myPresenceRef = db.ref(`rooms/${code}/presence/${myId.current}`);
      await myPresenceRef.set({ name, joinedAt: firebase.database.ServerValue.TIMESTAMP });
      myPresenceRef.onDisconnect().remove();

      const listRef = db.ref(`rooms/${code}/messages`);
      await listRef.push({ system: true, text: `${name} joined the room`, ts: Date.now() });

      msgListRef.current = listRef;
      listRef.on("value", (snap) => {
        const val = snap.val() || {};
        const list = Object.entries(val)
          .map(([id, m]) => ({ id, ...m }))
          .sort((a, b) => a.ts - b.ts);
        setMessages(list);
      });

      setRoomCode(code);
      setStage("chat");
    } catch (e) {
      setError("Couldn't connect. Check your Firebase setup.");
    }
    setConnecting(false);
  }

  async function handleCreateRoom() {
    const code = generateRoomCode();
    await enterRoom(code, true);
  }

  async function handleJoinRoom() {
    const code = roomInput.trim().toUpperCase();
    if (code.length < 4) { setError("Enter a valid room code."); return; }
    await enterRoom(code, false);
  }

  async function sendMessage() {
    const text = draft.trim();
    if (!text || !roomCode) return;
    setDraft("");
    try {
      await db.ref(`rooms/${roomCode}/messages`).push({ sender: name, text, ts: Date.now() });
    } catch (e) { setError("Message failed to send."); }
  }

  async function leaveRoom() {
    const code = roomCode;
    if (msgListRef.current) { msgListRef.current.off(); msgListRef.current = null; }
    try {
      await db.ref(`rooms/${code}/messages`).push({ system: true, text: `${name} left the room`, ts: Date.now() });
    } catch (e) {}
    await cleanupRoom(code);
    setMessages([]);
    setRoomCode("");
    setRoomInput("");
    setDraft("");
    setStage("name");
    setName("");
  }

  function copyCode() {
    navigator.clipboard && navigator.clipboard.writeText(roomCode).catch(() => {});
    setCopied(true);
    setTimeout(() => setCopied(false), 1500);
  }

  const shell = "min-h-screen w-full flex items-center justify-center bg-[#0B0E10] text-[#D7DEE2] font-mono px-4";

  if (stage === "name") {
    return (
      <div className={shell}>
        <div className="w-full max-w-sm">
          <div className="flex items-center gap-2 mb-8 justify-center">
            <Icon.Radio className="text-[#3DDC97]" />
            <span className="text-[10px] tracking-[0.3em] text-[#5C6870] uppercase">Secure Line</span>
          </div>
          <h1 className="text-2xl text-[#EDEFF0] mb-1 tracking-tight">Who's speaking?</h1>
          <p className="text-[#5C6870] text-sm mb-8">No accounts. No history. Nothing saved after you leave.</p>
          <input
            ref={nameInputRef}
            value={name}
            onChange={(e) => setName(e.target.value)}
            onKeyDown={(e) => { if (e.key === "Enter" && name.trim()) setStage("room"); }}
            placeholder="enter your name"
            maxLength={24}
            className="w-full bg-[#12161A] border border-[#232A30] focus:border-[#3DDC97] outline-none rounded-md px-4 py-3 text-[#EDEFF0] placeholder-[#3E4750] transition-colors"
          />
          <button
            onClick={() => name.trim() && setStage("room")}
            disabled={!name.trim()}
            className="mt-4 w-full bg-[#3DDC97] disabled:bg-[#1D2A24] disabled:text-[#3E4750] disabled:cursor-not-allowed text-[#0B0E10] font-semibold rounded-md py-3 transition-colors hover:bg-[#34c489]"
          >
            Continue
          </button>
        </div>
      </div>
    );
  }

  if (stage === "room") {
    return (
      <div className={shell}>
        <div className="w-full max-w-sm">
          <button onClick={() => { setStage("name"); setError(""); }} className="text-[#5C6870] text-xs mb-6 hover:text-[#8B98A2] transition-colors">
            ← back
          </button>
          <h1 className="text-2xl text-[#EDEFF0] mb-1 tracking-tight">Hey, {name}.</h1>
          <p className="text-[#5C6870] text-sm mb-8">Start a new room or join one with a code.</p>

          <button
            onClick={handleCreateRoom}
            disabled={connecting}
            className="w-full bg-[#3DDC97] text-[#0B0E10] font-semibold rounded-md py-3 mb-6 hover:bg-[#34c489] transition-colors disabled:opacity-60"
          >
            {connecting ? "Generating..." : "Create a new room"}
          </button>

          <div className="flex items-center gap-3 mb-6">
            <div className="h-px bg-[#232A30] flex-1" />
            <span className="text-[10px] text-[#3E4750] tracking-widest">OR</span>
            <div className="h-px bg-[#232A30] flex-1" />
          </div>

          <input
            ref={roomInputRef}
            value={roomInput}
            onChange={(e) => { setRoomInput(e.target.value.toUpperCase()); setError(""); }}
            onKeyDown={(e) => e.key === "Enter" && handleJoinRoom()}
            placeholder="ROOM CODE"
            maxLength={8}
            className="w-full bg-[#12161A] border border-[#232A30] focus:border-[#E8A855] outline-none rounded-md px-4 py-3 text-[#EDEFF0] placeholder-[#3E4750] tracking-[0.3em] text-center uppercase transition-colors"
          />
          <button
            onClick={handleJoinRoom}
            disabled={connecting || !roomInput.trim()}
            className="mt-3 w-full border border-[#E8A855] text-[#E8A855] font-semibold rounded-md py-3 hover:bg-[#E8A855]/10 transition-colors disabled:opacity-40 disabled:cursor-not-allowed"
          >
            Join room
          </button>

          {error && <p className="text-[#E8555A] text-xs mt-4 text-center">{error}</p>}
        </div>
      </div>
    );
  }

  return (
    <div className="min-h-screen w-full flex flex-col bg-[#0B0E10] text-[#D7DEE2] font-mono">
      <div className="border-b border-[#1A1F24] px-4 py-3 flex items-center justify-between shrink-0">
        <div className="flex items-center gap-3">
          <div className="w-1.5 h-1.5 rounded-full bg-[#3DDC97] animate-pulse" />
          <div>
            <div className="text-[10px] text-[#5C6870] tracking-[0.2em] uppercase leading-none mb-1">Room</div>
            <button onClick={copyCode} className="flex items-center gap-1.5 text-[#E8A855] font-semibold tracking-[0.15em] text-sm hover:opacity-80 transition-opacity">
              {roomCode}
              {copied ? <Icon.Check /> : <Icon.Copy />}
            </button>
          </div>
        </div>
        <button onClick={leaveRoom} className="flex items-center gap-1.5 text-[#5C6870] hover:text-[#E8555A] text-xs transition-colors">
          <Icon.LogOut />
          Leave
        </button>
      </div>

      <div className="flex items-center gap-2 px-4 py-2 bg-[#12161A] border-b border-[#1A1F24] shrink-0">
        <Icon.ShieldOff className="text-[#3E4750] shrink-0" />
        <p className="text-[10px] text-[#3E4750] leading-tight">
          Nothing here is saved. The room erases itself once everyone leaves.
        </p>
      </div>

      <div className="flex-1 overflow-y-auto px-4 py-4 space-y-3">
        {messages.length === 0 && (
          <p className="text-center text-[#3E4750] text-xs mt-8">
            Share code <span className="text-[#E8A855]">{roomCode}</span> with your friend to start.
          </p>
        )}
        {messages.map((m) => {
          if (m.system) {
            return (
              <div key={m.id} className="text-center">
                <span className="text-[10px] text-[#3E4750] tracking-wide">{m.text}</span>
              </div>
            );
          }
          const isMe = m.sender === name;
          return (
            <div key={m.id} className={`flex ${isMe ? "justify-end" : "justify-start"}`}>
              <div className={`max-w-[75%] rounded-lg px-3.5 py-2.5 ${isMe ? "bg-[#3DDC97] text-[#0B0E10]" : "bg-[#181D22] text-[#D7DEE2] border border-[#232A30]"}`}>
                {!isMe && <div className="text-[10px] text-[#E8A855] mb-0.5 font-semibold">{m.sender}</div>}
                <div className="text-sm leading-snug break-words whitespace-pre-wrap">{m.text}</div>
                <div className={`text-[9px] mt-1 text-right ${isMe ? "text-[#0B0E10]/50" : "text-[#3E4750]"}`}>
                  {new Date(m.ts).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })}
                </div>
              </div>
            </div>
          );
        })}
        <div ref={bottomRef} />
      </div>

      <div className="border-t border-[#1A1F24] p-3 shrink-0">
        <div className="flex items-center gap-2">
          <input
            ref={msgInputRef}
            value={draft}
            onChange={(e) => setDraft(e.target.value)}
            onKeyDown={(e) => e.key === "Enter" && sendMessage()}
            placeholder="type a message..."
            className="flex-1 bg-[#12161A] border border-[#232A30] focus:border-[#3DDC97] outline-none rounded-md px-4 py-2.5 text-sm text-[#EDEFF0] placeholder-[#3E4750] transition-colors"
          />
          <button
            onClick={sendMessage}
            disabled={!draft.trim()}
            className="bg-[#3DDC97] disabled:bg-[#1D2A24] disabled:text-[#3E4750] text-[#0B0E10] rounded-md p-2.5 hover:bg-[#34c489] transition-colors disabled:cursor-not-allowed"
          >
            <Icon.Send />
          </button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
